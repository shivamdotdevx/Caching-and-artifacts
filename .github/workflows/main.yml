name: Caching and Artifacts

on: 
  push: 
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repositery 
        uses: actions/checkout@v6.0.3
      - name: setup nodejs
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22.x
          cache: 'npm'

      - name: install dependencies
        run: npm install

      - name:  build react app
        run: npm run build

      - name:  i-upload build or artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: reactjs Build
          path: out/
